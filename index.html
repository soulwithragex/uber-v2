<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Uber Chile — ¿Hasta dónde llego?</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#07070e;
      --s1:#0d0d1c;
      --s2:#111128;
      --border:#1c1c38;
      --border2:#252548;
      --blue:#1677ff;
      --green:#00e096;
      --red:#ff4d6a;
      --text:#e8eaf6;
      --muted:#6b7280;
      --mono:'DM Mono',monospace;
      --sans:'Syne',sans-serif;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    .app{max-width:480px;margin:0 auto;padding:0 0 40px;}

    /* Tabs */
    .tabs { display:flex; align-items:center; gap:4px; padding:10px 20px 0; }
    .tab-btn { background:var(--s2); border:1px solid var(--border2); color:var(--muted); font-family:var(--mono); padding:6px 18px; border-radius:18px; margin-right:5px; cursor:pointer; }
    .tab-btn.active { background:var(--blue); color:#fff; }
    .brand { margin-left:auto; font-family:var(--mono); font-size:11px; color:var(--green); letter-spacing:2px; }

    /* General section/card styles for demo */
    .section{padding:20px 20px 0}
    .mini-card{background:var(--s1);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;padding:13px 15px;}
    .mini-card strong{color:var(--blue)}

    /* Historial & Buscador */
    .tab-content{padding:32px 22px;}
    input,button{font-family:inherit;}
    ul{margin:0 0 16px 16px;}
    li{margin-bottom:4px;}
    button[type="submit"], .tab-btn, button{outline:none;}
    .faq-row{padding:12px 0;}
  </style>
</head>
<body>
  <div class="app">
    <div class="section" style="padding-bottom:0">
      <h1 style="font-size:2rem;font-weight:900;margin-bottom:0.2em;">
        <span style="color:var(--blue)">Uber Chile</span> — ¿Hasta dónde llego?
      </h1>
      <div class="mini-card" style="margin-top:10px;">
        <div class="faq-row">
          <strong>P: ¿Qué le agregarías primero?</strong><br>
          R: Historial de búsquedas guardado, Modo nocturno / diurno + diseño mejorado, Buscar destino en el mapa y ver si alcanza
        </div>
      </div>
    </div>
    <!-- TABS -->
    <div class="tabs" id="tabs">
      <button class="tab-btn active" onclick="mostrarTab('main')">Calculadora</button>
      <button class="tab-btn" onclick="mostrarTab('historial')">Historial</button>
      <button class="tab-btn" onclick="mostrarTab('custom')">Buscar destino</button>
      <span class="brand">EdSoul-Ltdo.</span>
    </div>
    <!-- TAB 1: CALCULADORA -->
    <div id="tab-main">
      <div class="tab-content">
        <form id="calcForm" onsubmit="calcular(event)">
          <div>
            <label>Servicio:</label>
            <select id="service">
              <option value="UberX">UberX (Base $450, $220/km)</option>
              <option value="Comfort">Comfort (Base $800, $320/km)</option>
              <option value="Black">Black (Base $1.200, $600/km)</option>
              <option value="XL">XL (Base $900, $400/km)</option>
            </select>
          </div>
          <div style="margin-top:16px;">
            <label>Presupuesto CLP:</label>
            <input type="number" id="budget" value="1000" min="500" step="1" style="width:130px;">
          </div>
          <div style="margin-top:18px;">
            <button type="submit" style="font-weight:700;background:var(--blue);color:#fff;border:none;padding:10px 24px;border-radius:8px;">Calcular</button>
          </div>
        </form>
        <div id="resultado" style="margin-top:24px;"></div>
      </div>
    </div>
    <!-- TAB 2: HISTORIAL -->
    <div id="tab-historial" style="display:none;">
      <div class="tab-content">
        <h2 style="margin-bottom:15px;">Historial de búsquedas</h2>
        <div id="historialResultados"></div>
      </div>
    </div>
    <!-- TAB 3: BUSCAR DESTINO -->
    <div id="tab-custom" style="display:none;">
      <div class="tab-content">
        <h2>Buscar destino</h2>
        <input type="text" id="destinoInput" placeholder="Dirección o lat,long" style="font-size:16px;padding:8px 16px;width:75%;border-radius:6px; border:1px solid var(--border2)">
        <button onclick="buscarDestino()">Buscar y verificar</button>
        <div id="destinoResultado" style="margin-top:16px;"></div>
      </div>
    </div>
  </div>

  <script>
    // === Tabs
    function mostrarTab(tab) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => {
        const map={'main':0,'historial':1,'custom':2};
        b.classList.toggle('active', map[tab]===i);
      });
      document.getElementById('tab-main').style.display      = tab === 'main' ? 'block' : 'none';
      document.getElementById('tab-historial').style.display = tab === 'historial' ? 'block' : 'none';
      document.getElementById('tab-custom').style.display    = tab === 'custom' ? 'block' : 'none';
      if(tab==='historial') renderHistorial();
    }
    // === Calculadora simple
    function calcular(e){
      e.preventDefault();
      const servicio = document.getElementById('service').value;
      const presupuesto = Number(document.getElementById('budget').value);
      let base=450, km=220, min=1200;
      if(servicio==='Comfort'){ base=800; km=320; min=2000; }
      if(servicio==='Black'){ base=1200; km=600; min=3500; }
      if(servicio==='XL'){ base=900; km=400; min=2500; }
      if(presupuesto<min){
        document.getElementById('resultado').innerHTML = `El presupuesto no alcanza la tarifa mínima (${min} CLP)`;
        return;
      }
      const alcanzado = ((presupuesto - base)/km);
      document.getElementById('resultado').innerHTML =
        `Con <strong>$${presupuesto.toLocaleString('es-CL')}</strong> CLP en <strong>${servicio}</strong> puedes llegar hasta <b>${alcanzado.toFixed(2)} km</b>.<br>
        <span style="font-size:13px;color:var(--muted)">Base: $${base}, $${km}/km, mínimo: $${min}</span>`;
      saveHist(`[${new Date().toLocaleString()}] ${servicio} - $${presupuesto} - ${alcanzado.toFixed(2)}km`);
    }

    // === Historial localStorage
    function saveHist(item) {
      let hist = JSON.parse(localStorage.getItem('busquedasUberCL')) || [];
      hist.unshift(item);
      if(hist.length > 30) hist.length=30;
      localStorage.setItem('busquedasUberCL', JSON.stringify(hist));
    }
    function renderHistorial() {
      let hist = JSON.parse(localStorage.getItem('busquedasUberCL')) || [];
      let out = hist.length ? '<ul>' + hist.map(i=>`<li>${i}</li>`).join('') + '</ul>' : '<i>No hay búsquedas todavía.</i>';
      document.getElementById('historialResultados').innerHTML = out;
    }

    // === Busca destino demo (simula lat/long y distancia sólo como ejemplo)
    function buscarDestino() {
      const input = document.getElementById('destinoInput').value.trim();
      if(!input) {
        document.getElementById('destinoResultado').innerHTML = '<span style="color:var(--red)">Debes ingresar una dirección o latitud,longitud</span>';
        return;
      }
      let latApp = -33.45, lngApp = -70.65; // ficticio, pon el real con GPS si tienes
      let lat2, lng2;
      if(/^[-\d.]+,[-\d.]+$/.test(input)) {
        [lat2, lng2] = input.split(',').map(Number);
      } else {
        // Simula retorno de geocodificación
        lat2 = latApp + (Math.random()-0.5)*0.4;
        lng2 = lngApp + (Math.random()-0.5)*0.4;
      }
      function calcKm(lat1,lng1,lat2,lng2){
        const R=6371;const dLat=(lat2-lat1)*Math.PI/180;const dLon=(lng2-lng1)*Math.PI/180;
        const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));return R*c;
      }
      let dist = calcKm(latApp, lngApp, lat2, lng2);
      let msg = `La distancia hasta el punto es de <strong>${dist.toFixed(2)} km</strong>.<br>`;
      if(dist <= 3) msg += "<span style='color:var(--green)'>Puedes llegar con el presupuesto mínimo en UberX.</span>";
      else msg += "<span style='color:var(--red)'>No alcanza con el presupuesto mínimo en UberX.</span>";
      document.getElementById('destinoResultado').innerHTML = msg;
    }
  </script>
</body>
</html>
